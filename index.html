<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slang Podcast Partner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="podcast-container" class="container">
        <div class="podcast-header">
            <h2>Live Slang Podcast</h2>
            <div id="timer">02:00:00</div>
        </div>
        
        <div id="chat-window">
            <p class="ai-bubble"><strong>Gemini:</strong> Hey there! Ready to learn some wild new slang today? Tell me what you've been up to lately!</p>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your reply here...">
            <button id="send-btn">Talk</button>
        </div>

        <button id="end-btn" class="danger-btn">End Podcast & Get Summary</button>
    </div>

    <div id="summary-container" class="container hidden">
        <h2>Podcast Wrapped 🎧</h2>
        <p>Great session! Here are the slang words Gemini taught you today:</p>
        <ul id="slang-summary-list"></ul>
        <button onclick="location.reload()">Start New Session</button>
    </div>

    <div id="admin-vault" class="hidden">
        <h3>Master Key Settings</h3>
        <input type="password" id="master-key-input" placeholder="Paste your API key here">
        <button id="save-master-btn">Save Key</button>
    </div>

</body>
<script src="script.js"></script>
</html>
